<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun – Tiket1000</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

    <div class="auth-bg">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo">⚓ Tiket1000</a>

        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-icon">🧑‍✈️</div>
                <h2>Buat Akun Penumpang</h2>
                <p>Daftar untuk memesan tiket dan melacak perjalanan Anda</p>
            </div>

            <form id="register-form" onsubmit="submitRegister(event)">
                <div class="form-group">
                    <label class="auth-label" for="reg-nama">Nama Lengkap</label>
                    <input type="text" id="reg-nama" required placeholder="Nama lengkap Anda">
                </div>
                <div class="form-group">
                    <label class="auth-label" for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="email@contoh.com">
                </div>
                <div class="form-group">
                    <label class="auth-label" for="reg-telepon">No. Telepon / WhatsApp</label>
                    <input type="tel" id="reg-telepon" required placeholder="+62 8xx xxxx xxxx">
                </div>
                <div class="form-group" style="position:relative;">
                    <label class="auth-label" for="reg-pass">Password</label>
                    <input type="password" id="reg-pass" required placeholder="Min. 8 karakter">
                    <button type="button" class="toggle-pass" onclick="togglePasswordReg()" title="Tampilkan password">👁</button>
                </div>
                <div class="form-group">
                    <label class="auth-label" for="reg-pass2">Konfirmasi Password</label>
                    <input type="password" id="reg-pass2" required placeholder="Ulangi password">
                </div>

                <div class="auth-hint" id="reg-hint"></div>

                <button type="submit" class="cta-button auth-submit-btn">Daftar Sekarang</button>
            </form>

            <p class="auth-footer-text">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
