<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Tiket1000</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="features.css">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="dash-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">⚓ Tiket1000</div>

        <div class="sidebar-user" id="sidebar-user">
            <div class="sidebar-avatar" id="sidebar-avatar">?</div>
            <div>
                <div class="sidebar-name" id="sidebar-name">Loading…</div>
                <div class="sidebar-role-badge" id="sidebar-role-badge">—</div>
            </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
            <!-- filled by JS per role -->
        </nav>

        <button class="sidebar-logout" onclick="logout()">🚪 Keluar</button>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="dash-main" id="dash-main">
        <div class="dash-topbar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h1 class="dash-title" id="dash-title">Dashboard</h1>
        </div>

        <div class="dash-content" id="dash-content">
            <!-- filled by JS -->
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="features.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
